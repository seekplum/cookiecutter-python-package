name: Test

on:
  pull_request: {}
  push:
    branches: master
    tags: "*"

permissions:
  contents: read

env:
  LANG: "en_US.utf-8"
  LC_ALL: "en_US.utf-8"
  PRE_COMMIT_HOME: {% raw %}${{ github.workspace }}{% endraw %}/.cache/pre-commit
  PYTHONIOENCODING: "UTF-8"
  UV_VERSION: "0.11.7"
  DEVBOX_VERSION: "0.17.1"

jobs:
  tests:
    runs-on: {% raw %}${{ matrix.os }}{% endraw %}
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13", "3.14"]
        os:
          - macos-latest
          - ubuntu-latest
        include:
          - os: macos-latest
            pytest-xdist-maxprocesses: 3
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0 # Needs all tags to compute dynamic version
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: {% raw %}${{ env.UV_VERSION }}{% endraw %}
          python-version: {% raw %}${{ matrix.python-version }}{% endraw %}
          enable-cache: "true"
          cache-suffix: {% raw %}${{ matrix.python-version }}{% endraw %}
      - name: Set up Python {% raw %}${{ matrix.python-version }}{% endraw %}
        uses: actions/setup-python@v6
        with:
          python-version: {% raw %}${{ matrix.python-version }}{% endraw %}
      - name: Install dependencies
        run: uv sync --frozen
      - name: Static type checker
        run: uv run poe lint-mypy
      - name: Code formatter checker
        run: uv run poe lint-black
      - name: Imports alphabetically checker
        run: uv run poe lint-isort
      - name: Style guide checker
        run: uv run poe lint-flake8
      - name: Static code analyser
        run: uv run poe lint-pylint
      - name: Security code checker
        run: uv run poe lint-bandit
      - name: Run Unittest
        run: uv run poe test
  devbox:
    strategy:
      fail-fast: false
      matrix:
        os:
          - macos-latest
          - ubuntu-latest
        include:
          - os: macos-latest
            pytest-xdist-maxprocesses: 3
    runs-on: {% raw %}${{ matrix.os }}{% endraw %}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - name: Install devbox
        uses: jetify-com/devbox-install-action@v0.15.0
        with:
          devbox-version: {% raw %}${{ env.DEVBOX_VERSION }}{% endraw %}
          enable-cache: "true"
      - run: devbox run -- uv run pre-commit run --all-files --show-diff-on-failure
      - run: devbox run test
